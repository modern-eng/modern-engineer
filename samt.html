<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>masafa</title>
<style>
body {
padding:0px;
margin:0px;
background-color:#dfc;
}
.fl{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.flin{
display:flex;
flex-direction:row;
justify-content:space-around;
align-items:center;
}
label {
font-size:80px;
text-align:center;
}
.inps{
width:40vw;
height:35vh;
display:flex;
flex-direction:row;
justify-content:center;

}
h1{
width:90vw;
height:7vh;
font-size:50px;
}
.calc{
width:25vw;
height:5vh;
font-size:50px;
margin-top:25px;
color:white;
background-color:#090;
border:solid #0c0 5px;
border-radius:25px;
}
.calc:hover {
width:28vw;
height:6vh;
font-size:55px;
color:#090;
background-color:white;
border:solid #0c0 5px;
border-radius:25px;
}
.in {
width:30vw;
font-size:50px;
padding:10px;
padding-left:15px;
color:#666;
background-color:#0f9;
border:solid #0b6 5px;
border-radius:20px;
}
.results{
width:100vw;
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;

}
p{

width:80vw;
height:5vh;
font-size:50px;

}
.sp {
width:55vw;
font-size:50px;
padding:10px;
padding-left:15px;
color:#666;
background-color:#0f9;
border:solid #0b6 5px;
border-radius:20px;
}
.tl{
border-top-left-radius:50px;
border-top-right-radius:0px;
border-bottom-left-radius:0px;
border-bottom-right-radius:50px;
}
.tr{
border-top-left-radius:0%;
border-top-right-radius:50px;
border-bottom-left-radius:50px;
border-bottom-right-radius:0%;
}
.dl{
border-top-left-radius:0%;
border-top-right-radius:50px;
border-bottom-left-radius:50px;
border-bottom-right-radius:0%;
}
.dr{
border-top-left-radius:50px;
border-top-right-radius:0px;
border-bottom-left-radius:0px;
border-bottom-right-radius:50px;
}
.mar {
margin-left:20vw;
}
</style>
</head>
<body>
	<div class="fl" >
		<label>حساب السّمت من النقطة الاولى الى الثانية</label>
		<div class="fl" >
			<p class="mar" >: ادخل احداثيات النقطة الاولى</p>
			<div class="flin" >
			<input class="in tl" type="number"  id="xa" placeholder="XA" >
			<input class="in tr" type="number"  id="ya" placeholder="YA" >
			</div>
		</div>	
		<div class="fl" >
			<p class="mar" >: ادخل احداثيات النقطة الثانية</p>
			<div class="flin" >
			<input class="in dl" type="number"  id="xb" placeholder="XB" >
			<input class="in dr" type="number"  id="yb" placeholder="YB" >
			</div>
		</div>
		<div>
			<button class="calc" id="ihseb" onclick="calc()">أحسب</button>
		</div>
		<div>
			<p class="result sp" id="result" ></p>
		</div>
	</div>
<script>
function calc(){
var xa = document.getElementById("xa")
var xb = document.getElementById("xb")
var ya = document.getElementById("ya")
var yb = document.getElementById("yb")
var re = document.getElementById("result")
let dx = xb.value - xa.value 
let dy = yb.value - ya.value 
let dxdy = dx/dy
if(dxdy<0){
dxdy = dxdy * -1
}else{
dxdy=dxdy
}
let alfa = Math.atan(dxdy)
alfa = 200 * alfa /Math.PI
let g = alfa
if(dx > 0 && dy>0){
g = alfa
}
else if(dx>0 && dy < 0){
g = 200 - alfa
}
else if(dx<0 && dy<0){
g = 200 + alfa
}
else{
g = 400 - alfa
}
re.innerHTML = g
}

</script>	
</body>
</html>
